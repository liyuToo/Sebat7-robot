name: sebat7-Auto-Robot

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  execute-robot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added --retries to handle the SSL decryption error
          pip install --retries 10 --timeout 60 instagrapi beautifulsoup4 requests

      - name: Run sebat7 Bot
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
        run: python main.py
