name: sebat7-Auto-Robot

on:
  schedule:
    - cron: '0 14 * * *' # Runs daily at 2:00 PM UTC
  workflow_dispatch:      # Manual Start Button

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install instagrapi beautifulsoup4 requests

      - name: Run sebat7 Bot
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
        run: python main.py
